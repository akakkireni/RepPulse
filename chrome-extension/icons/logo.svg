<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#c7d2fe" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#c7d2fe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#sheen)"/>

  <!-- soft glow behind the live node -->
  <circle cx="662" cy="556" r="180" fill="url(#glow)"/>

  <!-- heartbeat / pulse line -->
  <path d="M150 556 H410 L470 556 L527 318 L602 762 L662 556 H882"
        fill="none" stroke="#ffffff" stroke-width="60"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- live signal node -->
